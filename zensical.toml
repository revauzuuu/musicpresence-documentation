[project]
site_name = "Music Presence"
site_description = "Resources and documentation for the Music Presence app."
site_author = "Jonas van den Berg"
site_url = "https://docs.musicpresence.app"
copyright = """
Copyright &copy; 2024<span style="margin: 0 0.05rem">-</span>2026 <nobr>Jonas van den Berg</nobr>
"""
repo_name = "ungive/discord-music-presence"
repo_url = "https://github.com/ungive/discord-music-presence"
edit_uri = "https://github.com/music-presence/documentation/edit/main/docs/"
extra_css = ["_static/styles/extra.css"]
nav = [
    {"Documentation" = [
        "index.md",
        {"Setup" = [
            "setup/installation.md",
            "setup/discord-settings.md",
            "setup/media-player-setup.md",
        ]},
        {"Discord Presence" = [
            "discord-presence/intro.md",
            "discord-presence/player-controls.md",
            "discord-presence/customization.md",
            "discord-presence/album-covers.md",
            "discord-presence/music-apis.md",
        ]},
        {"Scrobbling" = [
            "scrobbling/intro.md",
            "scrobbling/licensing.md",
        ]},
        {"Advanced" = [
            "advanced/app-interaction.md",
        ]},
    ]},
    {"Supported Players" = [
        "media-players/index.md",
    ]},
    {"Troubleshooting" = [
        "troubleshooting/index.md",
        "troubleshooting/faqs.md",
    ]},
    {"Community" = [
        "community/index.md",
    ]},
    {"Changelog" = [
        "changelog/index.md",
    ]},
    {"Legal" = [
        "legal/index.md",
        {"Documents" = [
            "legal/license-agreement.md",
            "legal/scrobbling-license-terms.md",
            "legal/privacy-policy.md",
        ]},
    ]},
]

[[project.extra_javascript]]
path = "_static/scripts/common.js"
type = "module"

[[project.extra_javascript]]
path = "_static/scripts/modules/helpers.mjs"
type = "module"

[project.theme]
language = "en"
variant = "modern"
favicon = "_static/images/favicon.ico"
custom_dir = "overrides"
font = false
features = [
    "content.action.edit",
    "content.tooltips",
    "navigation.footer",
    "navigation.instant",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.indexes",
    "navigation.expand",
    "toc.follow",
    "search.highlight",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.extra.footer_links]]
title="Music Presence"
url="https://musicpresence.app"
target="_blank"

[[project.extra.footer_links]]
title="Documentation"
url="/"

[[project.extra.footer_links]]
title="Legal"
url="/legal/"

[[project.extra.footer_links]]
title="Privacy Policy"
url="/legal/privacy-policy/"

[[project.extra.footer_links]]
title="Impressum"
url="https://jonasvandenberg.de/impressum"
target="_blank"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ungive/discord-music-presence"

[[project.extra.social]]
icon = "fontawesome/brands/discord"
link = "https://go.musicpresence.app/discord-invite"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]] 
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"
primary = "custom"
accent = "custom"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
primary = "custom"
accent = "custom"

[project.markdown_extensions.toc]
permalink = true
toc_depth = 4

[project.extra]
generator = false

[project.markdown_extensions.zensical.extensions.macros]
render_by_default = true
module_name = "macros"
include_dir = "includes"

# Stuff from the default configuration, needs to be added manually right now:
# https://zensical.org/docs/setup/extensions/#default-configuration
# https://github.com/zensical/zensical/issues/606
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
options.custom_icons = ["overrides/.icons"]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]


